---
layout: default
---
<section class="page-hero">
  <div class="container narrow">
    <p class="eyebrow">{{ page.eyebrow | default: "QA Automation Java" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="lead">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="content-section">
  <div class="container narrow prose">
    {{ content }}
  </div>
</section>
